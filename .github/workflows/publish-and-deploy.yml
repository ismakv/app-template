name: CI + Publish + Deploy App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
  REPO_NAME: ${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI
        run: make ci

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME }}-backend:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME }}-backend:latest

      - name: Build and push frontend image
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME }}-frontend:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME }}-frontend:latest

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync deploy files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APPS_DIR: ${{ secrets.VPS_APPS_DIR }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
        run: |
          set -euo pipefail
          APP_DIR="$VPS_APPS_DIR/$SERVICE_NAME"
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p \"$APP_DIR\""
          rsync -az \
            --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            -e "ssh -p $VPS_PORT" \
            deploy/ "$VPS_USER@$VPS_HOST:$APP_DIR/"

      - name: Update stack on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APPS_DIR: ${{ secrets.VPS_APPS_DIR }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
          IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
          REPO_NAME: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            set -euo pipefail
            APP_DIR=\"$VPS_APPS_DIR/$SERVICE_NAME\"
            cd \"\$APP_DIR\"
            cat > .deploy.env <<EOF
            BACKEND_IMAGE=$IMAGE_NAMESPACE/$REPO_NAME-backend
            FRONTEND_IMAGE=$IMAGE_NAMESPACE/$REPO_NAME-frontend
            IMAGE_TAG=$IMAGE_TAG
            EOF
            docker compose --env-file .deploy.env -f docker-compose.prod.yml pull || true
            docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d
          "
